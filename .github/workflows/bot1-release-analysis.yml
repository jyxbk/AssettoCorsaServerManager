name: Bot 1 - Release Code Analysis (lokales Ollama)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to analyze (leave empty to use the default branch)'
        required: false
        default: ''

permissions:
  contents: write # ai-bots/state.json wird ueber die Contents API aktualisiert (per BOT_PAT)
  issues: write

jobs:
  analyze:
    runs-on: [self-hosted, Windows]
    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      - name: Run AI code analysis
        env:
          # Must be a real PAT, not secrets.GITHUB_TOKEN: issues created with the
          # auto-generated token do not trigger other workflows (e.g. Bot 2).
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.ref || github.ref_name }}
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b
        run: python "C:\Users\j100\Documents\Gitbot\scripts\analyze_release.py"
