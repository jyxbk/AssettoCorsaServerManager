name: Bot 2 - AI Fix Suggestion (lokales Ollama)

on:
  issues:
    # "opened" is the only trigger we need: Bot 1 always creates issues with
    # the ai-detected label already attached, so the opened-event payload
    # already carries it. Also triggering on "labeled" caused a real 3x
    # amplification in practice (1 opened + 1 labeled-event per label
    # attached at creation), tripling Bot 2 runs and duplicate comments.
    # Trade-off: manually re-labeling an old issue with ai-detected no
    # longer auto-triggers Bot 2 -- an edge case that isn't part of the
    # normal automated flow.
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  suggest-fix:
    if: contains(github.event.issue.labels.*.name, 'ai-detected')
    runs-on: [self-hosted, Windows]
    steps:
      - name: Generate fix suggestion
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b
        run: python "C:\Users\j100\Documents\Gitbot\scripts\suggest_fix.py"
