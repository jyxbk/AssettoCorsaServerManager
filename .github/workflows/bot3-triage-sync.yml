name: Bot 3 - Triage Sync (lokales Ollama)

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write # nur fuer den seltenen "neue Regel gelernt"-Kommentar

jobs:
  triage-sync:
    if: contains(github.event.issue.labels.*.name, 'ai-detected')
    runs-on: [self-hosted, Windows]
    steps:
      - name: Sync ledger from closed issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STATE_REASON: ${{ github.event.issue.state_reason }}
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: qwen2.5-coder:7b
        run: python "C:\Users\j100\Documents\Gitbot\scripts\triage_sync.py"
